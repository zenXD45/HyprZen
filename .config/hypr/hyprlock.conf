# HyprZen — Hyprlock Config
# Reads current wallpaper from ~/wallpapers/current symlink

general {
    disable_loading_bar   = true
    grace                 = 0
    hide_cursor           = true
    no_fade_in            = false
    no_fade_out           = false
    ignore_empty_input    = false
}

# ── Background ────────────────────────────────────────────────
background {
    monitor     =
    path        = ~/wallpapers/current
    blur_passes = 3
    blur_size   = 8
    brightness  = 0.65
    contrast    = 0.9
    vibrancy    = 0.15
    vibrancy_darkness = 0.0
}

# ── Clock (large, centered top) ───────────────────────────────
label {
    monitor =
    text    = $TIME
    color   = rgba(192, 202, 245, 0.90)
    font_size   = 86
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 2
    shadow_size   = 4
    position  = 0, 260
    halign    = center
    valign    = center
}

# ── Date (below clock) ────────────────────────────────────────
label {
    monitor =
    text    = cmd[update:60000] date '+%A, %d %B %Y'
    color   = rgba(86, 95, 137, 0.90)
    font_size   = 18
    font_family = JetBrainsMono Nerd Font
    position  = 0, 175
    halign    = center
    valign    = center
}

# ── Input field ───────────────────────────────────────────────
input-field {
    monitor =
    size    = 280, 52
    outline_thickness = 2
    dots_size         = 0.25
    dots_spacing      = 0.2
    dots_center       = true
    dots_rounding     = -1
    outer_color       = rgba(122, 162, 247, 0.9)
    inner_color       = rgba(10, 10, 16, 0.85)
    font_color        = rgba(192, 202, 245, 1.0)
    fade_on_empty     = true
    fade_timeout      = 2000
    placeholder_text  = <i>password...</i>
    hide_input        = false
    rounding          = 26
    check_color       = rgba(122, 162, 247, 1.0)
    fail_color        = rgba(247, 118, 142, 1.0)
    fail_text         = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color    = rgba(224, 175, 104, 1.0)
    position = 0, -80
    halign   = center
    valign   = center
}

# ── User label ────────────────────────────────────────────────
label {
    monitor =
    text    = 󰀄  $USER
    color   = rgba(192, 202, 245, 0.60)
    font_size   = 13
    font_family = JetBrainsMono Nerd Font
    position  = 0, -140
    halign    = center
    valign    = center
}
