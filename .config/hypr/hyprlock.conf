# HyprZen — Hyprlock Config
source = ~/.config/hypr/themes/current_theme.conf

general {
    disable_loading_bar   = true
    grace                 = 0
    hide_cursor           = true
    no_fade_in            = false
    no_fade_out           = false
    ignore_empty_input    = false
}

# ── Background ────────────────────────────────────────────────
background {
    monitor     =
    path        = ~/wallpapers/current
    blur_passes = 3
    blur_size   = 8
    brightness  = 0.65
    contrast    = 0.9
    vibrancy    = 0.15
    vibrancy_darkness = 0.0
}

# ── Profile Picture ───────────────────────────────────────────
image {
    monitor =
    path = ~/.face
    size = 120
    rounding = -1
    border_size = 3
    border_color = rgb($primary)
    position = 0, 70
    halign = center
    valign = center
}

# ── Clock (large, centered top) ───────────────────────────────
label {
    monitor =
    text    = $TIME
    color   = rgb($primary)
    font_size   = 86
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 2
    shadow_size   = 4
    position  = 0, 260
    halign    = center
    valign    = center
}

# ── Date (below clock) ────────────────────────────────────────
label {
    monitor =
    text    = cmd[update:60000] date '+%A, %d %B %Y'
    color   = rgb($subtext)
    font_size   = 18
    font_family = JetBrainsMono Nerd Font
    position  = 0, 175
    halign    = center
    valign    = center
}

# ── Input field ───────────────────────────────────────────────
input-field {
    monitor =
    size    = 280, 52
    outline_thickness = 2
    dots_size         = 0.25
    dots_spacing      = 0.2
    dots_center       = true
    dots_rounding     = -1
    outer_color       = rgb($primary)
    inner_color       = rgb($surface)
    font_color        = rgb($text)
    fade_on_empty     = true
    fade_timeout      = 2000
    placeholder_text  = <i>password...</i>
    hide_input        = false
    rounding          = 26
    check_color       = rgb($primary)
    fail_color        = rgb($error)
    fail_text         = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color    = rgb($primary)
    position = 0, -80
    halign   = center
    valign   = center
}

# ── User label ────────────────────────────────────────────────
label {
    monitor =
    text    = 󰀄  $USER
    color   = rgb($text)
    font_size   = 13
    font_family = JetBrainsMono Nerd Font
    position  = 0, -140
    halign    = center
    valign    = center
}
