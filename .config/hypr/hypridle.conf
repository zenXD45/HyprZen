# HyprZen — Hypridle Config
# Idle management: dim → lock → sleep pipeline

general {
    lock_cmd        = pidof hyprlock || hyprlock   # only lock if not already locked
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# ── Step 1: Dim screen after 2.5 minutes ──────────────────────
listener {
    timeout  = 150
    on-timeout = brightnessctl -s set 20%   # dim to 20%
    on-resume  = brightnessctl -r            # restore saved brightness
}

# ── Step 2: Lock screen after 5 minutes ───────────────────────
listener {
    timeout  = 300
    on-timeout = loginctl lock-session
}

# ── Step 3: Turn off displays after 5.5 minutes ───────────────
listener {
    timeout  = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# ── Step 4: Suspend after 15 minutes ─────────────────────────
listener {
    timeout  = 900
    on-timeout = systemctl suspend
}
