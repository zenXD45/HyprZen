# ══════════════════════════════════════════════════════════════
# HyprZen Theme — void-black
# Pure black · 1px white border on active · no glow
# ══════════════════════════════════════════════════════════════

$bg          = 000000
$surface     = 0d0d0d
$overlay     = 1a1a1a

$border_active   = rgba(ffffffff)  # pure white, 1px
$border_inactive = rgba(1e1e1eff)  # nearly invisible

$rounding     = 12
$border_size  = 1
$gaps_in      = 4
$gaps_out     = 8

$blur_size    = 4
$blur_passes  = 2
$blur_vibrancy = 0.0

$inactive_opacity  = 0.88
$shadow_color      = rgba(00000000)
