# ══════════════════════════════════════════════════════════════
# HyprZen — Autostart (exec-once)
# Ultra Minimal Black — Waybar + Rofi + SwayNC + SwayOSD
# ══════════════════════════════════════════════════════════════

# ── Core System ───────────────────────────────────────────────
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORMTHEME
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORMTHEME
exec-once = sleep 2 && systemctl --user restart xdg-desktop-portal-hyprland xdg-desktop-portal

# ── Bar ───────────────────────────────────────────────────────
exec-once = waybar

# ── Notifications & OSD ───────────────────────────────────────
exec-once = swaync
exec-once = swayosd-server

# ── Wallpaper (swww is lighter than awww, same result) ────────
exec-once = awww-daemon
exec-once = sleep 0.5 && awww img ~/wallpapers/current --transition-type wipe

# ── Idle & Lock ───────────────────────────────────────────────
exec-once = hypridle

# ── Desktop Widgets ───────────────────────────────────────────
exec-once = eww daemon && eww open desktop_clock

# ── Clipboard ─────────────────────────────────────────────────
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Network tray ──────────────────────────────────────────────
exec-once = nm-applet --indicator

# ── GTK Theme ─────────────────────────────────────────────────
exec-once = gsettings set org.gnome.desktop.interface gtk-theme      'adw-gtk3-dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme   'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme     'Papirus-Dark'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme   'Bibata-Modern-Ice'
exec-once = gsettings set org.gnome.desktop.interface cursor-size    24
exec-once = gsettings set org.gnome.desktop.interface font-name      'JetBrainsMono Nerd Font 11'

# ── Window Switcher ───────────────────────────────────────────
exec-once = hyprswitch init --custom-css ~/.config/hyprswitch/style.css --size-factor 4 &
