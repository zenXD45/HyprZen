# ══════════════════════════════════════════════════════════════
# HyprZen — Workspaces
# Plain numbered workspaces — names shown in waybar as 1-8
# ══════════════════════════════════════════════════════════════

workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = special:magic, gapsin:30, gapsout:60, border:1

# ── App → Workspace rules ─────────────────────────────────────
windowrule = workspace 2 silent, match:class ^(firefox)$
windowrule = workspace 2 silent, match:class ^(chromium)$
windowrule = workspace 2 silent, match:class ^(zen-browser)$
windowrule = workspace 3 silent, match:class ^(Code)$
windowrule = workspace 3 silent, match:class ^(VSCodium)$
windowrule = workspace 4 silent, match:class ^(discord)$
windowrule = workspace 4 silent, match:class ^(org\.telegram\.desktop)$
windowrule = workspace 4 silent, match:class ^(Spotify)$
windowrule = workspace 4 silent, match:class ^(mpv)$
windowrule = workspace 3 silent, match:class ^(thunar)$
windowrule = workspace 4 silent, match:class ^(steam)$
windowrule = workspace 4 silent, match:class ^(lutris)$
