decoration {
    rounding = $rounding
    active_opacity = 1.0
    inactive_opacity = $inactive_opacity
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = $blur_size
        passes = $blur_passes
        new_optimizations = true
        xray = false
        noise = 0.015
        contrast = 1.0
        brightness = 0.9
        vibrancy = $blur_vibrancy
        vibrancy_darkness = 0.0
    }

    shadow {
        enabled = false
        range = 20
        render_power = 3
        color = rgba(00000022)
        color_inactive = rgba(00000000)
    }
}
