# ══════════════════════════════════════════════════════════════
# HyprZen — Window Rules (Hyprland 0.55+)
# ══════════════════════════════════════════════════════════════

# ── Floating apps ─────────────────────────────────────────────
windowrule = float 1,      match:class ^(hyprland-share-picker)$
windowrule = center 1,     match:class ^(hyprland-share-picker)$

windowrule = float 1,      match:class ^(xdg-desktop-portal-hyprland)$
windowrule = center 1,     match:class ^(xdg-desktop-portal-hyprland)$

windowrule = float 1,      match:class ^(thunar)$
windowrule = center 1,     match:class ^(thunar)$
windowrule = size 920 600, match:class ^(thunar)$

windowrule = float 1,      match:class ^(com\.gabm\.satty)$
windowrule = center 1,     match:class ^(com\.gabm\.satty)$
windowrule = size 1200 800, match:class ^(com\.gabm\.satty)$

windowrule = float 1,      match:class ^(org\.gnome\.Nautilus)$
windowrule = center 1,     match:class ^(org\.gnome\.Nautilus)$
windowrule = size 920 600, match:class ^(org\.gnome\.Nautilus)$

windowrule = float 1,      match:class ^(pavucontrol)$
windowrule = center 1,     match:class ^(pavucontrol)$
windowrule = size 720 500, match:class ^(pavucontrol)$

windowrule = float 1,      match:class ^(org\.pulseaudio\.pavucontrol)$
windowrule = center 1,     match:class ^(org\.pulseaudio\.pavucontrol)$
windowrule = size 720 500, match:class ^(org\.pulseaudio\.pavucontrol)$

windowrule = float 1,      match:class ^(impala)$
windowrule = center 1,     match:class ^(impala)$
windowrule = size 640 480, match:class ^(impala)$

windowrule = float 1,      match:class ^(org\.gnome\.Calculator)$
windowrule = center 1,     match:class ^(org\.gnome\.Calculator)$
windowrule = size 380 520, match:class ^(org\.gnome\.Calculator)$

windowrule = float 1,      match:class ^(imv)$
windowrule = center 1,     match:class ^(imv)$
windowrule = size 900 700, match:class ^(imv)$

windowrule = float 1,      match:class ^(mpv)$
windowrule = center 1,     match:class ^(mpv)$
windowrule = size 1280 720, match:class ^(mpv)$

# ── Rofi ──────────────────────────────────────────────────────
windowrule = float 1,  match:class ^(Rofi)$
windowrule = center 1, match:class ^(Rofi)$

# ── Wlogout ───────────────────────────────────────────────────
windowrule = float 1,  match:class ^(wlogout)$
windowrule = center 1, match:class ^(wlogout)$

# ── Picture-in-Picture ────────────────────────────────────────
windowrule = float 1,      match:title ^(Picture-in-Picture)$
windowrule = pin 1,        match:title ^(Picture-in-Picture)$
windowrule = move 73% 72%, match:title ^(Picture-in-Picture)$
windowrule = size 25% 25%, match:title ^(Picture-in-Picture)$

# ── Opacity ───────────────────────────────────────────────────
windowrule = opacity 0.92 0.85, match:class ^(kitty)$
windowrule = opacity 0.95 0.90, match:class ^(discord)$
windowrule = opacity 0.95 0.90, match:class ^(thunar)$
windowrule = opacity 0.92 0.88, match:class ^(obsidian)$
windowrule = opacity 0.95 0.90, match:class ^(org\.telegram\.desktop)$
windowrule = opacity 0.90 0.85, match:class ^(Code)$
windowrule = opacity 0.90 0.85, match:class ^(vscodium)$
windowrule = opacity 0.90 0.85, match:class ^(codium)$
windowrule = opacity 0.90 0.85, match:class ^(antigravity)$
windowrule = opacity 0.90 0.85, match:class ^(AntiGravity)$
windowrule = opacity 0.90 0.85, match:class ^(jetbrains-studio)$
windowrule = opacity 0.90 0.85, match:class ^(Android Studio)$
windowrule = opacity 0.90 0.85, match:class ^(librewolf)$

# ── Force tile ────────────────────────────────────────────────
windowrule = tile 1, match:class ^(Spotify)$
windowrule = tile 1, match:class ^(steam)$
windowrule = tile 1, match:class ^(lutris)$

# ── Steam popups ──────────────────────────────────────────────
windowrule = float 1,      match:class ^(steam)$, match:title ^(Friends List)$
windowrule = float 1,      match:class ^(steam)$, match:title ^(Steam Settings)$
windowrule = center 1,     match:class ^(steam)$, match:title ^(Steam Settings)$
windowrule = size 940 720, match:class ^(steam)$, match:title ^(Steam Settings)$

# ── Idle Inhibit ─────────────────────────────────────────────
windowrule = idle_inhibit focus,      match:class ^(mpv)$
windowrule = idle_inhibit fullscreen, match:class ^(firefox)$

# ── Layer Rules ───────────────────────────────────────────────
# Waybar
layerrule = blur 1,        match:namespace ^(waybar)$
layerrule = ignore_alpha 0.5, match:namespace ^(waybar)$

# SwayNC notifications
layerrule = blur 1,        match:namespace ^(swaync-notification-window)$
layerrule = ignore_alpha 0.1, match:namespace ^(swaync-notification-window)$

# SwayNC control center
layerrule = blur 1,        match:namespace ^(swaync-control-center)$
layerrule = ignore_alpha 0.1, match:namespace ^(swaync-control-center)$

# Rofi
layerrule = blur 1,        match:namespace ^(rofi)$
layerrule = ignore_alpha 0.1, match:namespace ^(rofi)$

# Hyprswitch
layerrule = blur 1,        match:namespace ^(hyprswitch)$
layerrule = ignore_alpha 0.1, match:namespace ^(hyprswitch)$

# Wlogout
layerrule = blur 1,        match:namespace ^(logout_dialog)$
layerrule = ignore_alpha 0.1, match:namespace ^(logout_dialog)$
