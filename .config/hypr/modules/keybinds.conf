# ══════════════════════════════════════════════════════════════
# HyprZen — Keybinds
# Ultra Minimal — No quickshell IPC for Hyprland
# ══════════════════════════════════════════════════════════════

$S  = SUPER
$SS = SUPER SHIFT
$SC = SUPER CTRL
$SA = SUPER ALT

# ── Apps ──────────────────────────────────────────────────────
bind = $S,  RETURN, exec, kitty
bind = $S,  B,      exec, firefox
bind = $S,  E,      exec, thunar
bind = $S,  C,      exec, code

# ── Launcher / Search ─────────────────────────────────────────
bind = $S,  SPACE,  exec, rofi -show drun   -theme ~/.config/rofi/minimal.rasi
bind = $S,  R,      exec, rofi -show run    -theme ~/.config/rofi/minimal.rasi
bind = $SA, TAB,    exec, rofi -show window -theme ~/.config/rofi/minimal.rasi
bind = $S,  comma,  exec, ~/Desktop/hyprzen/scripts/keybinds-cheat.sh

# ── Clipboard (cliphist → rofi) ───────────────────────────────
bind = $S,  V,      exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/minimal.rasi -p "󰅇 clip" | cliphist decode | wl-copy

# ── Notifications ─────────────────────────────────────────────
bind = $S,  N,      exec, swaync-client -t         # toggle control center
bind = $SS, N,      exec, swaync-client -d          # dismiss all

# ── Power / Session ───────────────────────────────────────────
bind = $SS, E,      exec, wlogout
bind = $SS, L,      exec, hyprlock

# ── Theme & Wallpaper ─────────────────────────────────────────
bind = $S,  W,      exec, ~/scripts/waybar-switcher.sh
bind = $SS, W,      exec, killall -SIGUSR1 waybar
bind = $SA, W,      exec, waypaper

# ── Screenshots ───────────────────────────────────────────────
bind = ,    Print,  exec, hyprshot -m output -o ~/screenshots
bind = $S,  Print,  exec, hyprshot -m region --raw | satty -f - --output-filename ~/screenshots/$(date '+%Y%m%d-%H%M%S').png
bind = $SC, Print,  exec, hyprshot -m region --clipboard-only

# ── Window Management ─────────────────────────────────────────
bind = $S,  Q,      killactive,
bind = $S,  F,      fullscreen,
bind = $SS, F,      togglefloating,
bind = $S,  P,      pseudo,
bind = $SA, F,      fullscreen, 1

# ── Focus (HJKL + arrows) ─────────────────────────────────────
bind = $S, H,     movefocus, l
bind = $S, L,     movefocus, r
bind = $S, K,     movefocus, u
bind = $S, J,     movefocus, d
bind = $S, left,  movefocus, l
bind = $S, right, movefocus, r
bind = $S, up,    movefocus, u
bind = $S, down,  movefocus, d

# ── Move Window ───────────────────────────────────────────────
bind = $SS, H,     movewindow, l
bind = $SS, L,     movewindow, r
bind = $SS, K,     movewindow, u
bind = $SS, J,     movewindow, d

# ── Resize ────────────────────────────────────────────────────
binde = $SA, right, resizeactive, 30 0
binde = $SA, left,  resizeactive, -30 0
binde = $SA, up,    resizeactive, 0 -30
binde = $SA, down,  resizeactive, 0 30

# ── Workspaces (1–4 visible by default) ───────────────────────
bind = $S, 1, workspace, 1
bind = $S, 2, workspace, 2
bind = $S, 3, workspace, 3
bind = $S, 4, workspace, 4
bind = $S, 5, workspace, 5
bind = $S, 6, workspace, 6
bind = $S, 7, workspace, 7
bind = $S, 8, workspace, 8
bind = $S, 9, workspace, 9
bind = $S, 0, workspace, 10

bind = $SS, 1, movetoworkspace, 1
bind = $SS, 2, movetoworkspace, 2
bind = $SS, 3, movetoworkspace, 3
bind = $SS, 4, movetoworkspace, 4
bind = $SS, 5, movetoworkspace, 5
bind = $SS, 6, movetoworkspace, 6
bind = $SS, 7, movetoworkspace, 7
bind = $SS, 8, movetoworkspace, 8
bind = $SS, 9, movetoworkspace, 9
bind = $SS, 0, movetoworkspace, 10

# ── Workspace Cycling ─────────────────────────────────────────
bind = $S, mouse_down, workspace, e+1
bind = $S, mouse_up,   workspace, e-1
bind = $SC, right,     workspace, e+1
bind = $SC, left,      workspace, e-1

# ── Scratchpad ────────────────────────────────────────────────
bind = $S,  S, togglespecialworkspace, magic
bind = $SS, S, movetoworkspace, special:magic

# ── Mouse Binds ───────────────────────────────────────────────
bindm = $S, mouse:272, movewindow
bindm = $S, mouse:273, resizewindow

# ── Media Keys ────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bindl  = , XF86AudioMicMute,     exec, swayosd-client --input-volume  mute-toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

# ── Brightness ────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# ── System ────────────────────────────────────────────────────
bind = $SC, R, exec, hyprctl reload && notify-send "Hyprland" "Config reloaded"
bind = $SC, Q, exit,
