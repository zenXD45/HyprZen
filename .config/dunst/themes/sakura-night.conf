[urgency_low]
    background  = "#16213e"
    foreground  = "#e2e8f0"
    frame_color = "#1a1a2e"
    timeout     = 4
    default_icon = dialog-information

[urgency_normal]
    background  = "#16213e"
    foreground  = "#e2e8f0"
    frame_color = "#333333"
    timeout     = 6
    default_icon = dialog-information

[urgency_critical]
    background  = "#16213e"
    foreground  = "#f38ba8"
    frame_color = "#f38ba8"
    timeout     = 0
    default_icon = dialog-warning
