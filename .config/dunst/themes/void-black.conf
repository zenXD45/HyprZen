[urgency_low]
    background  = "#13131c"
    foreground  = "#c0caf5"
    frame_color = "#1e1e2a"
    timeout     = 4
    default_icon = dialog-information

[urgency_normal]
    background  = "#13131c"
    foreground  = "#c0caf5"
    frame_color = "#333333"
    timeout     = 6
    default_icon = dialog-information

[urgency_critical]
    background  = "#13131c"
    foreground  = "#f7768e"
    frame_color = "#f7768e"
    timeout     = 0
    default_icon = dialog-warning
